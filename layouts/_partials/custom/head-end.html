<!-- Mainly to debug CSS if `&debug=true` or `&debug_css=true` is in the URL query string. Remove this when done. -->
<script>
    const params = new URLSearchParams(window.location.search);
    if ((params.get('debug_css') === 'true') || (params.get('debug') === 'true')) {
        document.documentElement.classList.add('debug');
    }
</script>
